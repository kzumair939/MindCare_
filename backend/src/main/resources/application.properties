# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server.port=8080
server.forward-headers-strategy=framework

# ─────────────────────────────────────────────
# DATABASE (Docker MySQL)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/DB_1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─────────────────────────────────────────────
# JWT SECURITY
# ─────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────────
# CORS — allow both Vite dev server and nginx prod
# ─────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}

# ─────────────────────────────────────────────
# EMAIL (GMAIL SMTP)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────
# GOOGLE OAUTH2
# ─────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ─────────────────────────────────────────────
# APP SETTINGS
# ─────────────────────────────────────────────
app.base-url=http://localhost:8080
app.frontend.url=http://localhost
app.free.sessions=2
admin.username=admin
admin.password=admin123
app.admin.email=admin@example.com

# ─────────────────────────────────────────────
# STRIPE (TEST KEYS)
# ─────────────────────────────────────────────
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}

# ─────────────────────────────────────────────
# FILE UPLOAD
# ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────
# ERROR DEBUGGING (DEV ONLY)
# ─────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
