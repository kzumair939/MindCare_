services:
  mysql:
    image: mysql:8.0
    container_name: mindcare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: umAIR911@
      MYSQL_DATABASE: DB_1
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: mindcare-backend
    # Backend runs internally on 8080; nginx proxies /api/ to it
    # NOT exposed directly to host — access everything via frontend:8080
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/DB_1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_FRONTEND_URL: http://localhost:8080
      APP_BASE_URL: http://localhost:8080
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: frontend
    container_name: mindcare-frontend
    # Frontend nginx is the single entry point on port 8080
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
